<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="google-site-verification" content="qR9d0YeObnYBzGrw1DAotaDMRmyyhgEUtowEwPxdxOw" />
	<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.js?features=es6"></script>
	<script>
		MathJax = {
		  tex: {
			inlineMath: [['$i', '$i']], //行内公式
		  }
		};
	</script>
	<!-- Standardizes dark mode state on load -->
	<script>
		if (localStorage.getItem('modeCurrent') === 'false' || (!('modeCurrent' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
			document.documentElement.classList.remove('dark');
		} else {
			document.documentElement.classList.add('dark');
		}
	</script>
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- Global Social Preview Meta Tags -->
	<meta property="og:site_name" content="Delta Kim" />
	<meta property="og:type" content="website" />
	<meta property="og:title" content="Delta Kim - Next Generation Web3 Ecosystem" />
	<meta property="og:description" content="Explore the Delta ecosystem: Keyless access, mobile mining, and a decentralized web built on ICP. Secure, fast, and eco-friendly." />
	<meta property="og:image" content="https://delta.kim/img/delta.logo.png" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:site" content="@TheDeltaKim" />
	<meta name="twitter:title" content="Delta Kim - Next Generation Web3 Ecosystem" />
	<meta name="twitter:description" content="Explore the Delta ecosystem: Keyless access, mobile mining, and a decentralized web built on ICP. Secure, fast, and eco-friendly." />
	<meta name="twitter:image" content="https://delta.kim/img/delta.logo.png" />

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover" data-theme="skeleton"> <!-- skeleton gold-nouveau -->
	<div class="h-full overflow-hidden contents">%sveltekit.body%</div>
</body>

</html>
